name: Build & Release

on:
    push:
        tags: ['*.*.*']

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install pyinstaller

            - name: Normalise icon (ensure multi-size Windows ICO)
              shell: bash
              run: |
                  python - <<'EOF'
                  from PIL import Image
                  img = Image.open("icon.ico").convert("RGBA")
                  sizes = [(16,16),(32,32),(48,48),(256,256)]
                  frames = [img.resize(s, Image.LANCZOS) for s in sizes]
                  frames[0].save("icon.ico", format="ICO",
                                 append_images=frames[1:],
                                 sizes=sizes)
                  print("icon.ico rewritten with sizes:", sizes)
                  EOF

            - name: Build executable
              run: |
                  pyinstaller --onefile --windowed --name SkyMusicPlayer `
                    --hidden-import pynput.keyboard._win32 `
                    --hidden-import pynput.mouse._win32 `
                    --icon icon.ico `
                    --add-data "icon.ico;." `
                    gui.py

            - name: Upload release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/SkyMusicPlayer.exe
                  generate_release_notes: true
